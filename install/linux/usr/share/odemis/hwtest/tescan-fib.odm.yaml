SEM: {
    class: Microscope,
    role: sem,
}

# Connects to Tescan SEM via SharkSEM
"Tescan SEM": {
    class: tescan.SEM,
    role: null,
    init: {host: "192.168.50.6"},
    # more detectors can be added, if necessary
    children: {
        stage: "Sample Stage",
        # FIB
        fib-scanner: "Ion Scanner",
        fib-detector: "Ion Detector",

        light: "Chamber Light",
    }
}

"Sample Stage": {
    role: stage,
    init: {},
    affects: ["Ion Scanner"]
}


# FIB specific components

"Ion Scanner": {
    # role: ion-beam,
    role: e-beam,

    init: {
        fov_range: [196.e-9, 25586.e-6]
    },
}

"Ion Detector": {
    # role: "se-detector-ion",
    role: se-detector,

    init: {
        channel: 0,
        detector: "se",
    },
}


# (IR) light for the SEM chamber
"Chamber Light": {
    role: chamber-light,
    init: {},
    affects: ["Chamber Cam"],
}
